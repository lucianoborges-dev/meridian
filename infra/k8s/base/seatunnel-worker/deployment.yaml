apiVersion: apps/v1
kind: Deployment
metadata:
  name: seatunnel-worker
  labels:
    app: seatunnel-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seatunnel-worker
  template:
    metadata:
      labels:
        app: seatunnel-worker
    spec:
      containers:
        - name: seatunnel
          image: seatunnel:0.0.1 # overridden by the overlays
          imagePullPolicy: IfNotPresent
          command:
            - /opt/seatunnel/bin/seatunnel-cluster.sh
            - -r
            - worker
          resources:
            limits:
              cpu: "2"
              memory: 4G
            requests:
              cpu: "500m"
              memory: 2G
          volumeMounts:
            - name: hazelcast-config
              mountPath: /opt/seatunnel/config/hazelcast-worker.yaml
              subPath: hazelcast.yaml
            - name: seatunnel-engine-config
              mountPath: /opt/seatunnel/config/seatunnel.yaml
              subPath: seatunnel.yaml
            - name: log4j-config
              mountPath: /opt/seatunnel/config/log4j.properties
              subPath: log4j.properties
            - name: nas-volume
              mountPath: /mnt/nas
              readOnly: true
            - name: output-volume
              mountPath: /output
          env:
            - name: HADOOP_HOME
              value: "/opt/seatunnel"
            - name: JvmOption
              value: "-Dlog4j.configuration=file:/opt/seatunnel/config/log4j.properties"
      volumes:
        - name: hazelcast-config
          configMap:
            name: seatunnel-worker-config
            items:
              - key: hazelcast.yaml
                path: hazelcast.yaml
        - name: seatunnel-engine-config
          configMap:
            name: seatunnel-worker-config
            items:
              - key: seatunnel.yaml
                path: seatunnel.yaml
        - name: log4j-config
          configMap:
            name: seatunnel-log4j-config
            items:
              - key: log4j.properties
                path: log4j.properties
        - name: nas-volume
          hostPath:
            path: /mnt/nas
        - name: output-volume
          hostPath:
            path: /mnt/output
