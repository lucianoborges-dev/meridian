apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/seatunnel-worker

patches:
  - path: patch-deployment.yaml

configMapGenerator:
  - name: seatunnel-worker-config
    behavior: create
    files:
      - hazelcast.yaml
      - seatunnel.yaml
  - name: seatunnel-log4j-config
    behavior: create
    files:
      - log4j.properties      